# models/gold/sources.yml
#
# Define as fontes de dados — as tabelas Gold que o PySpark criou no Databricks.
# O dbt usa isso para saber de onde vêm os dados e para gerar documentação.

version: 2

sources:
  - name: f1_gold
    description: "Tabelas Gold criadas pelo notebook 02_silver_to_gold no Databricks"
    schema: f1_gold
    catalog: main
    tables:
      - name: fct_race_results
        description: "Resultado de cada piloto por corrida — posição final, voltas, pit stops"
        columns:
          - name: session_key
            description: "Identificador único da sessão OpenF1"
          - name: driver_number
            description: "Número do piloto"
          - name: final_position
            description: "Posição final na corrida"
          - name: fastest_lap_seconds
            description: "Tempo da volta mais rápida em segundos"

      - name: fct_pit_stop_analysis
        description: "Análise de pit stops por equipe e circuito"
        columns:
          - name: team_name
            description: "Nome da equipe"
          - name: avg_pit_seconds
            description: "Tempo médio de pit stop em segundos"

      - name: dim_drivers
        description: "Dimensão de pilotos com dados da temporada"
        columns:
          - name: driver_number
            description: "Número do piloto (chave primária)"
          - name: full_name
            description: "Nome completo do piloto"
          - name: team_name
            description: "Equipe atual"

      - name: agg_driver_performance
        description: "Performance acumulada por piloto na temporada"

models:
  - name: fct_lap_rankings
    description: "Ranking de volta mais rápida por piloto em cada circuito"
    columns:
      - name: lap_rank
        description: "Posição no ranking de volta mais rápida do circuito"
        tests:
          - not_null

  - name: agg_championship_ranking
    description: "Ranking do campeonato estimado com sistema de pontos real da F1"
    columns:
      - name: championship_rank
        description: "Posição no campeonato"
        tests:
          - not_null
      - name: total_points
        description: "Total de pontos acumulados na temporada"
        tests:
          - not_null

  - name: fct_team_pit_performance
    description: "Performance de pit stops por equipe na temporada"
    columns:
      - name: team_name
        description: "Nome da equipe"
        tests:
          - not_null
          - unique
      - name: pit_efficiency_rank
        description: "Ranking de eficiência de pit stop"
        tests:
          - not_null
