name: f1_pipeline
version: "1.0.0"
config-version: 2

profile: f1_pipeline

# Onde ficam os modelos, testes e macros
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  f1_pipeline:
    bronze:
      +materialized: view        # Bronze: views leves sobre os dados raw
      +schema: bronze
    silver:
      +materialized: table       # Silver: tabelas materializadas e limpas
      +schema: silver
    gold:
      +materialized: table       # Gold: modelos analíticos finais
      +schema: gold
