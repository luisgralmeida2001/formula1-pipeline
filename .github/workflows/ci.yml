name: CI — F1 Data Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint com ruff
        run: ruff check ingestion/

      - name: Formatar com black (check)
        run: black --check ingestion/

      - name: Rodar testes
        run: pytest ingestion/tests/ -v

  dbt-check:
    name: Validação dbt
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dbt-databricks
        run: pip install dbt-databricks

      - name: Criar profiles.yml para CI
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          f1_pipeline:
            target: dev
            outputs:
              dev:
                type: databricks
                host: community.cloud.databricks.com
                http_path: /sql/1.0/warehouses/598c5e04b5c9ca75
                token: dummy_token_for_syntax_check
                catalog: main
                schema: f1_gold
                threads: 1
          EOF

      - name: dbt parse (valida sintaxe dos modelos)
        working-directory: dbt/
        run: dbt parse --no-partial-parse
